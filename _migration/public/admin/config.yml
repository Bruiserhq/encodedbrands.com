backend:
  name: github
  repo: Bruiserhq/encodedbrands.com
  branch: migration/phase-0-astro

media_folder: "_migration/public/uploads"
public_folder: "/uploads"

collections:
  - name: homepage
    label: Homepage
    folder: "_migration/src/content/homepage"
    format: frontmatter
    extension: md
    create: false
    fields:
      - { name: title, label: Title, widget: string }
      - { name: tagline, label: Tagline, widget: string }
      - { name: body, label: Body, widget: markdown }
