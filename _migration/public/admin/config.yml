backend:
  name: github
  repo: Bruiserhq/encodedbrands.com
  branch: homepage/rebuild-v1

media_folder: "_migration/public/uploads"
public_folder: "/uploads"

collections:
  - name: homepage
    label: Homepage
    format: frontmatter
    extension: md
    files:
      - name: hero
        label: Hero
        file: "_migration/src/content/homepage/hero.md"
        fields:
          - { name: meta_left, label: "Meta bar — left text", widget: string }
          - name: meta_right
            label: "Meta bar — right items"
            widget: list
            fields:
              - { name: text, label: Text, widget: string }
          - { name: eyebrow, label: Eyebrow, widget: string }
          - name: headline_lines
            label: "Headline lines"
            widget: list
            fields:
              - { name: text, label: Text, widget: string }
              - { name: style, label: Style, widget: select, options: [normal, em, amp], default: normal }
              - { name: break_after, label: "Line break after?", widget: boolean, default: false }
          - { name: subtitle, label: Subtitle (HTML allowed), widget: text }
          - { name: detail, label: Detail (HTML allowed), widget: text }
          - name: ctas
            label: CTAs
            widget: list
            fields:
              - { name: label, label: Label, widget: string }
              - { name: href, label: URL, widget: string }
              - { name: ghost, label: "Ghost style?", widget: boolean, default: false }
          - { name: quote, label: Pull quote, widget: text }
          - name: ticker
            label: Ticker items
            widget: list
            fields:
              - { name: text, label: Text, widget: string }
          - { name: prompt_card_label, label: "Prompt card label", widget: string }
          - { name: prompt_card_title, label: "Prompt card title", widget: string }
          - { name: prompt_card_meta, label: "Prompt card meta", widget: string }
          - { name: prompt_card_body, label: "Prompt body", widget: text }
          - { name: prompt_cta_label, label: "Prompt CTA label", widget: string }
          - { name: prompt_cta_href, label: "Prompt CTA URL", widget: string }
      - name: strip
        label: "Ticker strip"
        file: "_migration/src/content/homepage/strip.md"
        fields:
          - name: items
            label: Items
            widget: list
            fields:
              - { name: text, label: Text, widget: string }

      - name: thesis
        label: "§01 Why it matters"
        file: "_migration/src/content/homepage/thesis.md"
        fields:
          - { name: idx, label: "Index label", widget: string }
          - { name: heading, label: "Heading (HTML allowed)", widget: text }
          - { name: lede_idx, label: "Lede index", widget: string }
          - { name: lede, label: "Lede (HTML allowed)", widget: text }
          - { name: body_idx, label: "Body index", widget: string }
          - name: body_paragraphs
            label: "Body paragraphs"
            widget: list
            fields:
              - { name: text, label: Text (HTML allowed), widget: text }
          - { name: quote_idx, label: "Quote index label", widget: string, required: false }
          - { name: quote, label: "Pull quote — leave blank to hide (HTML allowed)", widget: text, required: false }

      - name: surfaces
        label: "§02 Where your brand lives"
        file: "_migration/src/content/homepage/surfaces.md"
        fields:
          - { name: idx, label: "Index label", widget: string }
          - { name: heading, label: "Heading (HTML allowed)", widget: text }
          - { name: blurb, label: "Blurb", widget: text }
          - name: cards
            label: "Surface cards"
            widget: list
            fields:
              - { name: num, label: "Number/label", widget: string }
              - { name: title, label: "Title (HTML allowed)", widget: string }
              - { name: body, label: "Body (HTML allowed)", widget: text }
              - name: chips
                label: "Chips"
                widget: list
                fields:
                  - { name: text, label: Text, widget: string }

      - name: how
        label: "How it works"
        file: "_migration/src/content/homepage/how.md"
        fields:
          - { name: idx, label: "Index label", widget: string }
          - { name: heading, label: "Heading (HTML allowed)", widget: text }
          - name: steps
            label: "Steps"
            widget: list
            fields:
              - { name: title, label: "Title (HTML allowed)", widget: string }
              - { name: body, label: "Body (HTML allowed)", widget: text }
          - { name: cta_primary_label, label: "Primary CTA label", widget: string }
          - { name: cta_primary_href, label: "Primary CTA URL", widget: string }
          - { name: cta_secondary_label, label: "Secondary CTA label", widget: string }
          - { name: cta_secondary_href, label: "Secondary CTA URL", widget: string }

      - name: pricing
        label: "Pricing"
        file: "_migration/src/content/homepage/pricing.md"
        fields:
          - { name: idx, label: "Index label", widget: string }
          - { name: heading, label: "Heading (HTML allowed)", widget: text }
          - { name: blurb, label: "Blurb", widget: text }
          - name: tiers
            label: "Tiers"
            widget: list
            fields:
              - { name: popular, label: "Most popular?", widget: boolean, default: false }
              - { name: tag, label: "Tag", widget: string }
              - { name: price_num, label: "Price", widget: string }
              - { name: price_per, label: "Price subtitle", widget: string }
              - { name: title, label: "Title", widget: string }
              - { name: body, label: "Body", widget: text }
              - name: features
                label: "Features"
                widget: list
                fields:
                  - { name: text, label: Text, widget: string }
              - { name: cta_label, label: "CTA label", widget: string }
              - { name: cta_href, label: "CTA URL", widget: string }
              - { name: cta_accent, label: "Accent button?", widget: boolean, default: false }
          - { name: footer, label: "Footer (HTML allowed)", widget: text }

      - name: tech
        label: "For the technically curious"
        file: "_migration/src/content/homepage/tech.md"
        fields:
          - { name: idx, label: "Index label", widget: string }
          - { name: heading, label: "Heading (HTML allowed)", widget: text }
          - { name: blurb, label: "Blurb", widget: text }
          - { name: card_title, label: "Code card title", widget: string }
          - { name: card_meta, label: "Code card meta", widget: string }
          - { name: footer, label: "Footer (HTML allowed)", widget: text }

      - name: manifesto
        label: "Manifesto"
        file: "_migration/src/content/homepage/manifesto.md"
        fields:
          - { name: idx, label: "Index label", widget: string }
          - { name: eyebrow, label: "Eyebrow", widget: string }
          - { name: quote, label: "Quote (HTML allowed)", widget: text }

      - name: dogfood
        label: "We use it ourselves"
        file: "_migration/src/content/homepage/dogfood.md"
        fields:
          - { name: idx, label: "Index label", widget: string }
          - { name: heading, label: "Heading (HTML allowed)", widget: text }
          - { name: kicker, label: "Kicker", widget: string }
          - { name: sub_heading, label: "Sub-heading (HTML allowed)", widget: string }
          - name: body_paragraphs
            label: "Body paragraphs"
            widget: list
            fields:
              - { name: text, label: Text (HTML allowed), widget: text }
          - name: meta
            label: "Meta items"
            widget: list
            fields:
              - { name: text, label: Text (HTML allowed), widget: string }
          - { name: cta_primary_label, label: "Primary CTA label", widget: string }
          - { name: cta_primary_href, label: "Primary CTA URL", widget: string }
          - { name: cta_secondary_label, label: "Secondary CTA label", widget: string }
          - { name: cta_secondary_href, label: "Secondary CTA URL", widget: string }
          - { name: code_card_title, label: "Code card title", widget: string }
          - { name: code_card_meta, label: "Code card meta", widget: string }

      - name: launch
        label: "Launch"
        file: "_migration/src/content/homepage/launch.md"
        fields:
          - { name: idx, label: "Index label", widget: string }
          - { name: eyebrow, label: "Eyebrow", widget: string }
          - { name: heading, label: "Heading (HTML allowed)", widget: text }
          - { name: body, label: "Body (HTML allowed)", widget: text }
          - { name: cta_primary_label, label: "Primary CTA label", widget: string }
          - { name: cta_primary_href, label: "Primary CTA URL", widget: string }
          - { name: cta_secondary_label, label: "Secondary CTA label", widget: string }
          - { name: cta_secondary_href, label: "Secondary CTA URL", widget: string }

  - name: site
    label: Site
    files:
      - name: nav
        label: Navigation
        file: "_migration/src/content/site/nav.md"
        fields:
          - { name: brand, label: "Brand name", widget: string }
          - { name: brand_small, label: "Brand subtitle", widget: string }
          - name: links
            label: Links
            widget: list
            fields:
              - { name: label, label: Label, widget: string }
              - { name: href, label: URL, widget: string }
          - { name: cta_label, label: "CTA label", widget: string }
          - { name: cta_href, label: "CTA URL", widget: string }
      - name: footer
        label: Footer
        file: "_migration/src/content/site/footer.md"
        fields:
          - { name: brand, label: "Brand", widget: string }
          - { name: sub, label: "Sub-line (HTML allowed)", widget: string }
          - name: columns
            label: Columns
            widget: list
            fields:
              - { name: heading, label: Heading, widget: string }
              - name: links
                label: Links
                widget: list
                fields:
                  - { name: label, label: Label, widget: string }
                  - { name: href, label: URL, widget: string }
          - { name: bottom_left, label: "Bottom left", widget: string }
          - { name: bottom_right, label: "Bottom right (HTML allowed)", widget: string }

  - name: pages
    label: Pages
    format: frontmatter
    extension: md
    files:
      - name: start
        label: "/start"
        file: "_migration/src/content/pages/start.md"
        fields:
          - { name: title, label: "<title> (browser tab)", widget: string }
          - { name: description, label: "Meta description", widget: text }
          - { name: meta_left, label: "Hero meta — left", widget: string }
          - { name: meta_right, label: "Hero meta — right", widget: string }
          - { name: hero_heading, label: "Hero heading (HTML allowed)", widget: text }
          - { name: hero_lede, label: "Hero lede (HTML allowed)", widget: text }
      - name: encode
        label: "/encode"
        file: "_migration/src/content/pages/encode.md"
        fields:
          - { name: title, label: "<title> (browser tab)", widget: string }
          - { name: description, label: "Meta description", widget: text }
          - { name: meta_left, label: "Hero meta — left", widget: string }
          - { name: meta_right, label: "Hero meta — right", widget: string }
          - { name: hero_heading, label: "Hero heading (HTML allowed)", widget: text }
          - { name: hero_lede, label: "Hero lede (HTML allowed)", widget: text }
      - name: docs
        label: "/docs"
        file: "_migration/src/content/pages/docs.md"
        fields:
          - { name: title, label: "<title> (browser tab)", widget: string }
          - { name: description, label: "Meta description", widget: text }
